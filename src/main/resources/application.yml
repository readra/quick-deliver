spring:
  application:
    name: quick-deliver
  
  autoconfigure:
    exclude:
      - org.springframework.boot.actuate.autoconfigure.metrics.export.prometheus.PrometheusMetricsExportAutoConfiguration
    
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
    
  h2:
    console:
      enabled: true
      path: /h2-console
      
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
        
  security:
    user:
      name: admin #FIXME
      password: admin123 #FIXME
      
server:
  port: 8080
  
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    
jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970 #FIXME
  expiration: 86400000 # 24 hours

# Kakao API
kakao:
  map:
    api-key: ${KAKAO_MAP_API_KEY:YOUR_KAKAO_JS_API_KEY}      # JS 지도 키 (프론트엔드)
  mobility:
    api-key: ${KAKAO_REST_API_KEY:}                           # REST 키 (길찾기 API, 미설정 시 fallback)
  
logging:
  level:
    com.delivery.quickdeliver: INFO
    org.springframework.web: INFO
    
management:
  endpoints:
    web:
      exposure:
        include: health, info
  prometheus:
    metrics:
      export:
        enabled: false
